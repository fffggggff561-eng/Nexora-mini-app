<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXORA Fortune</title>

<style>
body{
    margin:0;
    background:#0d0d0d;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:90%;
    max-width:400px;
    text-align:center;
    background:#171717;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(120,0,255,.35);
}

h1{
    color:#8a5cff;
}

button{
    margin-top:20px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#8a5cff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

#prediction{
    margin-top:25px;
    font-size:20px;
    line-height:1.5;
}
</style>

</head>

<body>

<div class="box">

<h1>🔮 NEXORA Fortune</h1>

<p>Получите своё предсказание на сегодня</p>

<button onclick="fortune()">Получить предсказание</button>

<div id="prediction"></div>

</div>

<script>

const list=[
"💰 Сегодня ты найдёшь выгодный оффер.",
"🚀 Самое время масштабироваться.",
"📈 ROI превзойдёт ожидания.",
"🤝 Скоро появится новое сотрудничество.",
"🔥 Не бойся запускать тесты.",
"💎 Большая возможность уже рядом.",
"⚡ Сегодня удача на твоей стороне.",
"🎯 Один правильный контакт всё изменит.",
"📊 Время анализировать и расти.",
"🏆 Сегодня отличный день для новых побед."
];

function fortune(){

let random=Math.floor(Math.random()*list.length);

document.getElementById("prediction").innerHTML=list[random];

}

</script>

</body>
</html>
