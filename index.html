<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>NEXORA Fortune</title>

<meta name="theme-color" content="#6f3cff">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>
<div class="background-glow"></div>
<div id="particles"></div>

<div class="container">

<header class="header">

<div class="logo">
🔮
</div>

<h1>NEXORA Fortune</h1>

<p class="subtitle">
Open your destiny card
</p>

</header>

<section class="stats">

<div class="stat-card">

<div class="stat-name">
✨ Aura
</div>

<div class="stat-value" id="auraValue">
--
</div>

</div>

<div class="stat-card">

<div class="stat-name">
🔥 Streak
</div>

<div class="stat-value" id="streakValue">
0
</div>

</div>

<div class="stat-card">

<div class="stat-name">
🏆 Level
</div>

<div class="stat-value" id="levelValue">
Explorer
</div>

</div>

</section>

<section class="reward hidden" id="dailyReward">

🎁 Daily Reward

</section>

<div class="deck">

<div class="card" id="fortuneCard">

<div class="card-face card-front">

<div class="front-logo">

🔮

</div>

<div class="front-title">

NEXORA

</div>

<div class="front-text">

Tap to discover your destiny

</div>

</div>

<div class="card-face card-back">

<div id="secretBadge" class="secret hidden">

💎 SECRET

</div>

<div id="rarity">

⭐⭐

</div>

<div id="cardTitle">

The Scale

</div>

<div id="category">

Affiliate

</div>

<div id="prediction">

Prediction

</div>

<div id="cardNumber">

Card #001

</div>

</div>

</div>

</div>

<div class="buttons">

<button id="openCard">

🔮 Open Card

</button>

<button id="shareButton" class="hidden">

📤 Share

</button>

</div>

<section class="collection">

<div class="collection-title">

Statistics

</div>

<div class="collection-grid">

<div class="collection-box">

<div class="collection-number" id="openedCards">
0
</div>

<div class="collection-label">
Opened
</div>

</div>

<div class="collection-box">

<div class="collection-number" id="legendaryCount">
0
</div>

<div class="collection-label">
Legendary
</div>

</div>

<div class="collection-box">

<div class="collection-number" id="secretCount">
0
</div>

<div class="collection-label">
Secret
</div>

</div>

</div>

</section>

</div>

<script src="predictions.js"></script>
<script src="script.js"></script>

</body>
</html>
