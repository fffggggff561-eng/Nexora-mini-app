<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NEXORA Fortune</title>

    <meta name="theme-color" content="#6f3cff">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="particles"></div>

<div class="background-glow"></div>

<div class="container">

    <div class="logo">
        🔮
    </div>

    <h1>NEXORA Fortune</h1>

    <p class="subtitle">
        Открой карту и узнай,
        что приготовил для тебя сегодняшний день.
    </p>

    <div class="deck">

        <div class="card" id="fortuneCard">

            <div class="card-front">

                <div class="card-logo">

                    ✨

                </div>

                <div class="card-title">

                    NEXORA

                </div>

            </div>

            <div class="card-back">

                <div id="rarity"></div>

                <div id="cardNumber"></div>

                <div id="prediction"></div>

            </div>

        </div>

    </div>

    <button id="openCard">

        Открыть карту

    </button>

    <button id="shareButton" class="hidden">

        Поделиться

    </button>

</div>

<script src="predictions.js"></script>

<script src="script.js"></script>

</body>
</html>
